name: Build

on:
    push:
      branches:
        - main
    workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download Seikaku Engine (Windows x86_64)
        shell: pwsh
        run: |
          $baseUrl = "https://github.com/zifox666/Seikaku-Engine/releases/latest/download"
          $url = "$baseUrl/seikaku_engine-windows-x86_64.dll"
          Write-Host "Downloading: $url"
          Invoke-WebRequest -Uri $url -OutFile seikaku_labo\seikaku_engine.dll
          Write-Host "DLL downloaded to seikaku_labo\seikaku_engine.dll"

      - name: Flutter pub get
        working-directory: seikaku_labo
        run: flutter pub get

      - name: Build Windows (Release)
        working-directory: seikaku_labo
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-windows-x64
          path: seikaku_labo/build/windows/x64/runner/Release/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Android
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download Seikaku Engine (Android)
        run: |
          BASE_URL="https://github.com/zifox666/Seikaku-Engine/releases/latest/download"
          ARCHIVE="libseikaku_engine-android-jniLibs.zip"
          DEST="seikaku_labo/android/app/src/main/jniLibs"

          echo "Downloading $ARCHIVE..."
          curl -fsSL "$BASE_URL/$ARCHIVE" -o "/tmp/$ARCHIVE"

          echo "Extracting to $DEST..."
          unzip "/tmp/$ARCHIVE" -d "$DEST"
          ls -la "$DEST"

      - name: Flutter pub get
        working-directory: seikaku_labo
        run: flutter pub get

      - name: Build Android APK (split per ABI)
        working-directory: seikaku_labo
        run: |
          flutter build apk \
            --release \
            --split-per-abi

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-android-apks
          path: seikaku_labo/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
