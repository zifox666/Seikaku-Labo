name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  ENGINE_URL: "https://github.com/zifox666/Seikaku-Engine/releases/latest/download"
  FLUTTER_DIR: seikaku_labo

jobs:
  # ─────────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine DLL
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ env.ENGINE_URL }}/seikaku_engine-windows-x86_64.dll" `
            -OutFile "${{ env.FLUTTER_DIR }}\seikaku_engine.dll"

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build Windows
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ env.FLUTTER_DIR }}\build\windows\x64\runner\Release\*" `
            -DestinationPath seikaku-labo-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-windows-x64
          path: seikaku-labo-windows-x64.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # Android (universal APK)
  # ─────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine jniLibs
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-android-jniLibs.zip" \
            -o /tmp/jniLibs.zip
          unzip /tmp/jniLibs.zip -d "${{ env.FLUTTER_DIR }}/android/app/src/main/jniLibs"

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build universal APK
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-android
          path: ${{ env.FLUTTER_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # macOS (universal)
  # ─────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine dylib
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-macos-universal.dylib" \
            -o "${{ env.FLUTTER_DIR }}/libseikaku_engine.dylib"

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build macOS
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build macos --release

      - name: Bundle engine dylib into .app
        run: |
          APP="${{ env.FLUTTER_DIR }}/build/macos/Build/Products/Release/seikaku_labo.app"
          FW="$APP/Contents/Frameworks"
          mkdir -p "$FW"
          cp "${{ env.FLUTTER_DIR }}/libseikaku_engine.dylib" "$FW/"
          install_name_tool -id "@rpath/libseikaku_engine.dylib" "$FW/libseikaku_engine.dylib"
          codesign --force --sign - "$FW/libseikaku_engine.dylib"
          codesign --force --deep --sign - "$APP"

      - name: Package
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/macos/Build/Products/Release"
          zip -r -y "$GITHUB_WORKSPACE/seikaku-labo-macos.zip" seikaku_labo.app

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-macos
          path: seikaku-labo-macos.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # iOS (no-codesign)
  # ─────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine static lib
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-ios-device.a" \
            -o "${{ env.FLUTTER_DIR }}/ios/libseikaku_engine.a"

      - name: Configure static linking
        run: |
          echo 'OTHER_LDFLAGS=$(inherited) -force_load $(SRCROOT)/libseikaku_engine.a' \
            >> "${{ env.FLUTTER_DIR }}/ios/Flutter/Release.xcconfig"

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build iOS
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/ios/iphoneos"
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r "$GITHUB_WORKSPACE/seikaku-labo-ios.ipa" Payload

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-ios
          path: seikaku-labo-ios.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  # Linux x64
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Download engine .so
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-linux-x86_64.so" \
            -o "${{ env.FLUTTER_DIR }}/libseikaku_engine.so"

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build Linux
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build linux --release

      - name: Package
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/linux/x64/release/bundle"
          tar -czf "$GITHUB_WORKSPACE/seikaku-labo-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-linux-x64
          path: seikaku-labo-linux-x64.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # GitHub Release (commit-hash tag)
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs:
      - build-windows
      - build-android
      - build-macos
      - build-ios
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/seikaku-labo-windows-x64/seikaku-labo-windows-x64.zip   release/
          cp artifacts/seikaku-labo-android/app-release.apk                     release/seikaku-labo-android.apk
          cp artifacts/seikaku-labo-macos/seikaku-labo-macos.zip                release/
          cp artifacts/seikaku-labo-ios/seikaku-labo-ios.ipa                    release/
          cp artifacts/seikaku-labo-linux-x64/seikaku-labo-linux-x64.tar.gz    release/

      - name: Create release tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "RELEASE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Build ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/*
