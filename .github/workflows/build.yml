name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  ENGINE_URL: "https://github.com/zifox666/Seikaku-Engine/releases/latest/download"
  FLUTTER_DIR: seikaku_labo

jobs:
  # ─────────────────────────────────────────────
  # 预下载内置数据包（SDE + 图片包）
  # 所有平台构建共享此 artifact
  # ─────────────────────────────────────────────
  prepare-bundled-data:
    name: Prepare Bundled Data
    runs-on: ubuntu-latest
    steps:
      - name: Fetch SDE latest release info
        id: sde_info
        run: |
          RELEASE=$(curl -fsSL \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/zifox666/eve-sde-converter/releases/latest")
          SDE_TAG=$(echo "$RELEASE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['tag_name'])")
          SDE_URL=$(echo "$RELEASE" | python3 -c "
          import sys,json; d=json.load(sys.stdin)
          a=[x for x in d['assets'] if x['name']=='sde.sqlite.bz2']
          print(a[0]['browser_download_url'])
          ")
          echo "SDE_TAG=$SDE_TAG" >> $GITHUB_OUTPUT
          echo "SDE_URL=$SDE_URL" >> $GITHUB_OUTPUT
          echo "Fetched SDE tag: $SDE_TAG"

      - name: Download SDE database
        run: |
          echo "Downloading SDE from ${{ steps.sde_info.outputs.SDE_URL }}"
          curl -fsSL "${{ steps.sde_info.outputs.SDE_URL }}" -o sde.sqlite.bz2
          echo "SDE size: $(du -sh sde.sqlite.bz2 | cut -f1)"

      - name: Download image pack (Nightly)
        run: |
          curl -fsSL \
            "https://github.com/zifox666/Seikaku-Labo/releases/download/Nightly/image.zip" \
            -o image.zip
          echo "Image size: $(du -sh image.zip | cut -f1)"

      - name: Create bundled_version.json
        run: |
          cat > bundled_version.json <<EOF
          {
            "bundled": true,
            "sde_tag": "${{ steps.sde_info.outputs.SDE_TAG }}",
            "image_tag": "Nightly"
          }
          EOF
          cat bundled_version.json

      - name: Upload bundled data artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-data
          path: |
            bundled_version.json
            sde.sqlite.bz2
            image.zip
          retention-days: 1

  # ─────────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    needs: [prepare-bundled-data]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine DLL
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ env.ENGINE_URL }}/seikaku_engine-windows-x86_64.dll" `
            -OutFile "${{ env.FLUTTER_DIR }}\seikaku_engine.dll"

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: ${{ env.FLUTTER_DIR }}/assets/bundled

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build Windows
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ env.FLUTTER_DIR }}\build\windows\x64\runner\Release\*" `
            -DestinationPath seikaku-labo-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-windows-x64
          path: seikaku-labo-windows-x64.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # Android (universal APK)
  # ─────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    needs: [prepare-bundled-data]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine jniLibs
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-android-jniLibs.zip" \
            -o /tmp/jniLibs.zip
          unzip /tmp/jniLibs.zip -d "${{ env.FLUTTER_DIR }}/android/app/src/main/jniLibs"

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: ${{ env.FLUTTER_DIR }}/assets/bundled

      - name: Setup Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storeFile=../app/release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > android/key.properties
            echo "Release keystore configured."
          else
            echo "No keystore secret found, falling back to debug signing."
          fi

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build universal APK
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-android
          path: ${{ env.FLUTTER_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─────────────────────────────────────────────
  # macOS (universal)
  # ─────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    needs: [prepare-bundled-data]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine dylib
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-macos-universal.dylib" \
            -o "${{ env.FLUTTER_DIR }}/libseikaku_engine.dylib"

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: ${{ env.FLUTTER_DIR }}/assets/bundled

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build macOS
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build macos --release

      - name: Bundle engine dylib into .app
        run: |
          APP="${{ env.FLUTTER_DIR }}/build/macos/Build/Products/Release/seikaku_labo.app"
          FW="$APP/Contents/Frameworks"
          mkdir -p "$FW"
          cp "${{ env.FLUTTER_DIR }}/libseikaku_engine.dylib" "$FW/"
          install_name_tool -id "@rpath/libseikaku_engine.dylib" "$FW/libseikaku_engine.dylib"
          codesign --force --sign - "$FW/libseikaku_engine.dylib"
          codesign --force --deep --sign - "$APP"

      - name: Package
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/macos/Build/Products/Release"
          zip -r -y "$GITHUB_WORKSPACE/seikaku-labo-macos.zip" seikaku_labo.app

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-macos
          path: seikaku-labo-macos.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  # iOS (no-codesign)
  # ─────────────────────────────────────────────
  build-ios:
    name: iOS
    runs-on: macos-latest
    needs: [prepare-bundled-data]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download engine static lib
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-ios-device.a" \
            -o "${{ env.FLUTTER_DIR }}/ios/libseikaku_engine.a"

      - name: Configure static linking
        run: |
          echo 'OTHER_LDFLAGS=$(inherited) -force_load $(SRCROOT)/libseikaku_engine.a' \
            >> "${{ env.FLUTTER_DIR }}/ios/Flutter/Release.xcconfig"

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: ${{ env.FLUTTER_DIR }}/assets/bundled

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build iOS
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build ios --release --no-codesign

      - name: Create IPA (unsigned, compatible with 爱思助手/Sideloadly)
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/ios/iphoneos"
          mkdir -p Payload
          cp -r Runner.app Payload/
          # 删除所有旧签名信息，确保爱思助手可以从头重签
          find Payload/Runner.app -name '_CodeSignature' -type d -exec rm -rf {} + 2>/dev/null || true
          find Payload/Runner.app -name 'embedded.mobileprovision' -delete 2>/dev/null || true
          zip -r "$GITHUB_WORKSPACE/seikaku-labo-ios.ipa" Payload
          echo "IPA size: $(du -sh $GITHUB_WORKSPACE/seikaku-labo-ios.ipa | cut -f1)"

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-ios
          path: seikaku-labo-ios.ipa
          retention-days: 30

  # ─────────────────────────────────────────────
  # Linux x64
  # ─────────────────────────────────────────────
  build-linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    needs: [prepare-bundled-data]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Download engine .so
        run: |
          curl -fsSL "${{ env.ENGINE_URL }}/libseikaku_engine-linux-x86_64.so" \
            -o "${{ env.FLUTTER_DIR }}/libseikaku_engine.so"

      - name: Download bundled data
        uses: actions/download-artifact@v4
        with:
          name: bundled-data
          path: ${{ env.FLUTTER_DIR }}/assets/bundled

      - name: Flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: Build Linux
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build linux --release

      - name: Package
        run: |
          cd "${{ env.FLUTTER_DIR }}/build/linux/x64/release/bundle"
          tar -czf "$GITHUB_WORKSPACE/seikaku-labo-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: seikaku-labo-linux-x64
          path: seikaku-labo-linux-x64.tar.gz
          retention-days: 30

  # ─────────────────────────────────────────────
  # GitHub Release (commit-hash tag)
  # ─────────────────────────────────────────────
  release:
    name: Release
    needs:
      - build-windows
      - build-android
      - build-macos
      - build-ios
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/seikaku-labo-windows-x64/seikaku-labo-windows-x64.zip   release/
          cp artifacts/seikaku-labo-android/app-release.apk                     release/seikaku-labo-android.apk
          cp artifacts/seikaku-labo-macos/seikaku-labo-macos.zip                release/
          cp artifacts/seikaku-labo-ios/seikaku-labo-ios.ipa                    release/
          cp artifacts/seikaku-labo-linux-x64/seikaku-labo-linux-x64.tar.gz    release/

      - name: Create release tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "RELEASE_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Build ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: release/*
